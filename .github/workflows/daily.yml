name: Daily brief

# When this runs.
on:
  schedule:
    # GitHub cron is always UTC. 00:30 UTC = 06:00 IST (India).
    # Change this one line to match your morning. Format: min hour day month weekday.
    - cron: "30 0 * * *"
  workflow_dispatch: {} # also lets you run it by hand from the Actions tab

# Let the job push the fresh brief back to the repo.
permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Scrape today's sources
        run: npm run scrape

      - name: Write the brief
        run: npm run brief
        env:
          # The key never lives in this file — it comes from a repo secret.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit the fresh brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.brief.json data/seen.json web/brief.json
          # Only commit if something actually changed (a quiet day = no commit).
          git diff --staged --quiet || git commit -m "chore: daily brief for $(date -u +%F)"
          git push
